        document.getElementById('modeBatch').addEventListener('click', () => switchMode('batch'));
        
        function switchMode(mode) {
            currentMode = mode;
            document.getElementById('modeSingle').classList.toggle('active', mode === 'single');
            document.getElementById('modeBatch').classList.toggle('active', mode === 'batch');
            
            if (mode === 'batch') {
                urlInput.placeholder = '粘贴多个视频链接，每行一个...\n例如：\nhttps://v.douyin.com/xxx1\nhttps://v.douyin.com/xxx2';
                urlInput.rows = 4;
            } else {
                urlInput.placeholder = '粘贴视频分享链接...';
                urlInput.rows = 2;
            }
            
            resultSection.classList.remove('show');
            batchSection.classList.remove('show');
            hideStatus();
        }
        
        document.querySelectorAll('.platform-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.platform-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentPlatform = tab.dataset.platform;
            });
        });
        
        document.getElementById('pasteBtn').addEventListener('click', async () => {
            try {
                const text = await navigator.clipboard.readText();
                urlInput.value = text;
                if (currentMode === 'single') handleParse();
            } catch (err) {
                showStatus('无法读取剪贴板', 'error');
            }
        });
        
        parseBtn.addEventListener('click', handleParse);
        urlInput.addEventListener('paste', () => {
            setTimeout(() => {
                if (currentMode === 'single') handleParse();
            }, 100);
        });
        
        async function handleParse() {
            if (currentMode === 'batch') return handleBatchParse();
            
            let url = extractUrl(urlInput.value.trim());
            if (!url) {
                showStatus('请输入视频链接', 'error');
                return;
            }
            
            setLoading(true);
            hideStatus();
            resultSection.classList.remove('show');
            batchSection.classList.remove('show');
            
            try {
                const resp = await fetch(`${API_BASE}/api/parse`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url, platform: currentPlatform })
                });
                
                const data = await resp.json();
                
                if (data.code === 0 && data.data) {
                    showSingleResult(data.data);
                    addToHistory(data.data);
                    showStatus('解析成功', 'success');
                } else {
                    showStatus(data.msg || '解析失败', 'error');
                }
            } catch (err) {
                showStatus('无法连接到服务器', 'error');
            } finally {
                setLoading(false);
            }
        }
        
        async function handleBatchParse() {
            const raw = urlInput.value.trim();
            if (!raw) {
                showStatus('请输入视频链接', 'error');
                return;
            }
            
            const lines = raw.split('\n').map(l => extractUrl(l.trim())).filter(Boolean);
            if (lines.length === 0) {
                showStatus('未能提取到有效链接', 'error');
                return;
            }
            if (lines.length > 20) {
                showStatus('最多支持 20 个链接', 'error');
                return;
            }
            
            setLoading(true);
            resultSection.classList.remove('show');
            batchSection.classList.add('show');
            
            let batchResults = lines.map((url, i) => ({
                url,
                platform: detectPlatformFromUrl(url),
                index: i,
                status: 'pending',
                data: null
            }));
            
            renderBatchList(batchResults);
            let successCount = 0;
            
            for (let i = 0; i < batchResults.length; i++) {
                batchResults[i].status = 'parsing';
                renderBatchList(batchResults);
                
                try {
                    const resp = await fetch(`${API_BASE}/api/parse`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ url: batchResults[i].url, platform: batchResults[i].platform })
                    });
                    const data = await resp.json();
                    
                    if (data.code === 0 && data.data) {
                        batchResults[i].status = 'success';
                        batchResults[i].data = data.data;
                        successCount++;
                    } else {
                        batchResults[i].status = 'error';
                    }
                } catch (err) {
                    batchResults[i].status = 'error';
                }
                
                renderBatchList(batchResults);
            }
            
            setLoading(false);
            batchDownloadAllBtn.disabled = successCount === 0;
            showStatus(`批量解析完成：${successCount}/${batchResults.length} 个成功`, successCount === batchResults.length ? 'success' : 'error');
        }
        
        function detectPlatformFromUrl(url) {
            if (/douyin|iesdouyin|v\.douyin/i.test(url)) return 'douyin';
            if (/kuaishou|v\.kuaishou/i.test(url)) return 'kuaishou';
            if (/xiaohongshu|xhslink/i.test(url)) return 'xiaohongshu';
            if (/bilibili|b23\.tv/i.test(url)) return 'bilibili';
            return currentPlatform;
        }
        
        window.downloadFile = async function(videoUrl, filename, type) {
            if (isMobile()) {
                showMobileDownloadModal(videoUrl, filename, type);
                return;
            }
            
            showStatus('正在下载...', 'info');
            try {
                const resp = await fetch(videoUrl, { method: 'GET', mode: 'cors' });
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                
                const blob = await resp.blob();
                const blobUrl = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = blobUrl;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(blobUrl);
                showStatus('下载完成', 'success');
            } catch (err) {
                showStatus('已打开视频，请手动保存', 'success');
                window.open(videoUrl, '_blank');
            }
        };
        
        function isMobile() {
            return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        }
        
        function showMobileDownloadModal(videoUrl, filename, type) {
            const isAudio = type === 'audio';
            const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
            const hintText = isIOS ? '长按视频 → 存储视频' : '长按视频 → 保存视频';
            
            const modal = document.createElement('div');
            modal.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:10000;padding:20px;';
            
            modal.innerHTML = `
                <div style="background:#fff;border-radius:16px;padding:24px;max-width:360px;width:100%;text-align:center;">
                    <h3 style="font-size:16px;margin-bottom:12px;">${isAudio ? '🎵 下载音频' : '📹 下载视频'}</h3>
                    <p style="color:#666;font-size:14px;margin-bottom:16px;">${hintText}</p>
                    ${isAudio ? `<audio controls src="${videoUrl}" style="width:100%;margin-bottom:16px;"></audio>` : `<video controls playsinline src="${videoUrl}" style="width:100%;max-height:50vh;border-radius:8px;margin-bottom:16px;"></video>`}
                    <a href="${videoUrl}" download="${filename}" style="display:block;background:#0066ff;color:white;padding:14px 20px;border-radius:8px;text-decoration:none;font-weight:500;">点击下载</a>
                </div>
            `;
            modal.className = 'mobile-modal';
            document.body.appendChild(modal);
            modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });
        }
        
        function showSingleResult(info) {
            const platformNames = { douyin: '抖音', kuaishou: '快手', xiaohongshu: '小红书', bilibili: 'B站' };
            const safeName = (info.title || 'video').replace(/[^\w\u4e00-\u9fff\-_. ]/g, '').trim() || 'video';
            
            resultSection.innerHTML = `
                <div class="result-card">
                    <div class="result-video">
                        ${info.video_url ? `<video controls preload="metadata" poster="${info.cover || ''}" playsinline><source src="${info.video_url}" type="video/mp4"></video>` : `<div class="no-video"><svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1"><polygon points="5 3 19 12 5 21 5 3"/></svg>暂无视频</div>`}
                    </div>
                    <div class="result-info">
                        <div class="result-title">${escapeHtml(info.title || '未知标题')}</div>
                        <div class="result-meta">
                            ${info.author ? `<span>${escapeHtml(info.author)}</span>` : ''}
                            <span>${platformNames[info.platform] || '未知'}</span>
                        </div>
                        <div class="result-actions">
                            ${info.video_url ? `
                                <button class="download-btn download-btn-video" onclick="downloadFile('${info.video_url}','${safeName}.mp4')">下载视频</button>
                                ${info.music_url ? `<button class="download-btn download-btn-audio" onclick="downloadFile('${info.music_url}','${(info.music_title || safeName).replace(/[^\w\u4e00-\u9fff\-_. ]/g,"")}.mp3','audio')">下载音频</button>` : ''}
                                <button class="download-btn download-btn-copy" onclick="navigator.clipboard.writeText('${info.video_url}').then(()=>{this.textContent='已复制';setTimeout(()=>this.textContent='复制链接',1500)})">复制链接</button>
                            ` : ''}
                        </div>
                    </div>
                </div>
            `;
            resultSection.classList.add('show');
            resultSection.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
        
        function renderBatchList(items) {
            const statusLabels = { pending: '等待中', parsing: '解析中', success: '成功', error: '失败' };
            
            batchList.innerHTML = items.map((item, i) => {
                const title = item.data?.title || item.url || `视频 ${i + 1}`;
                const cover = item.data?.cover || '';
                const safeName = title.replace(/[^\w\u4e00-\u9fff\-_. ]/g, '').trim() || `video_${i+1}`;
                
                return `
                    <div class="batch-item">
                        <img class="batch-item-thumb" src="${cover}" alt="" onerror="this.style.display='none'">
                        <div class="batch-item-info">
                            <div class="batch-item-title">${escapeHtml(title)}</div>
                            <div class="batch-item-meta">${item.data?.author || ''}</div>
                        </div>
                        <span class="batch-item-status ${item.status === 'parsing' ? 'pending' : item.status}">${statusLabels[item.status] || item.status}</span>
                        <div style="display:flex;gap:6px;">
                            ${item.status === 'success' && item.data?.video_url ? `<button class="batch-item-btn" onclick="downloadFile('${item.data.video_url}','${safeName}.mp4')" title="下载">⬇</button>` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        batchDownloadAllBtn.addEventListener('click', () => {
            const buttons = batchList.querySelectorAll('.batch-item-btn[title="下载"]');
            buttons.forEach((btn, i) => setTimeout(() => btn.click(), i * 500));
        });
        
        function addToHistory(info) {
            const item = {
                title: info.title,
                platform: info.platform,
                cover: info.cover,
                url: info.video_url,
                time: new Date().toLocaleString('zh-CN')
            };
            history.unshift(item);
            if (history.length > 10) history.pop();
            localStorage.setItem('qingqingjiexi_history', JSON.stringify(history));
            renderHistory();
        }
        
        function renderHistory() {
            if (history.length === 0) {
                historySection.style.display = 'none';
                return;
            }
            historySection.style.display = 'block';
            
            const platformIcons = { douyin: '🎵', kuaishou: '📱', xiaohongshu: '📕', bilibili: '📺' };
            
            historyList.innerHTML = history.map(item => `
                <div class="history-item" onclick="window.open('${item.url}', '_blank')">
                    <div class="history-item-icon">${platformIcons[item.platform] || '📹'}</div>
                    <div class="history-item-info">
                        <div class="history-item-title">${escapeHtml(item.title)}</div>
                        <div class="history-item-time">${item.time}</div>
                    </div>
                </div>
            `).join('');
        }
        
        document.getElementById('clearHistory').addEventListener('click', () => {
            history = [];
            localStorage.removeItem('qingqingjiexi_history');
            renderHistory();
        });
        
        function extractUrl(text) {
            const match = text.match(/https?:\/\/[^\s\u4e00-\u9fff]+/);
            return match ? match[0].replace(/[，。！？、；：""''）】》]+$/, '') : text.trim();
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function setLoading(loading) {
            parseBtn.disabled = loading;
            parseBtn.querySelector('span').textContent = loading ? '解析中...' : '开始解析';
        }
        
        function showStatus(msg, type) {
            statusMessage.textContent = msg;
            statusMessage.className = 'status-message show ' + type;
            if (type === 'success') setTimeout(hideStatus, 3000);
        }
        
        function hideStatus() {
            statusMessage.classList.remove('show');
        }
        
        renderHistory();
    })();
    </script>
</body>
</html>
