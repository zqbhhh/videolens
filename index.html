                <button class="paste-btn" id="pasteBtn" title="粘贴">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
                        <rect x="8" y="2" width="8" height="4" rx="1"/>
                    </svg>
                </button>
            </div>
            
            <button class="parse-btn" id="parseBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/>
                    <path d="M21 3v5h-5"/>
                </svg>
                <span>开始解析</span>
            </button>
        </section>
        
        <!-- Status -->
        <div class="status-message" id="statusMessage"></div>
        
        <!-- Result -->
        <section class="result-section" id="resultSection"></section>
        
        <!-- Batch -->
        <section class="batch-section" id="batchSection">
            <div class="batch-header">
                <div class="batch-title">>>> 批量解析结果</div>
                <button class="batch-download-all" id="batchDownloadAllBtn" disabled>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="7 10 12 15 17 10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                    下载全部
                </button>
            </div>
            <div class="batch-list" id="batchList"></div>
        </section>
        
        <!-- History -->
        <section class="history-section" id="historySection" style="display:none">
            <div class="history-header">
                <div class="history-title">解析历史</div>
                <button class="history-clear" id="clearHistory">清空</button>
            </div>
            <div class="history-list" id="historyList"></div>
        </section>
    </main>
    
    <!-- Footer -->
    <footer id="features">
        <p>清清解析 · 短视频无水印解析工具</p>
        <p>完全免费，请合法使用</p>
        <p>支持抖音、快手、小红书、B站</p>
    </footer>
    
    <script>
    (function() {
        'use strict';
        
        const API_BASE = '';
        let currentPlatform = 'douyin';
        let currentMode = 'batch';
        let history = JSON.parse(localStorage.getItem('qingqingjiexi_history') || '[]');
        
        // Create floating pixels
        const pixelBg = document.getElementById('pixelBg');
        for (let i = 0; i < 30; i++) {
            const pixel = document.createElement('div');
            pixel.className = 'pixel';
            pixel.style.left = Math.random() * 100 + '%';
            pixel.style.animationDelay = Math.random() * 20 + 's';
            pixel.style.animationDuration = (15 + Math.random() * 10) + 's';
            const colors = ['#ff2d95', '#00f5ff', '#ffe600', '#39ff14', '#bf00ff'];
            pixel.style.background = colors[Math.floor(Math.random() * colors.length)];
            pixelBg.appendChild(pixel);
        }
        
        // DOM elements
        const urlInput = document.getElementById('urlInput');
        const parseBtn = document.getElementById('parseBtn');
        const resultSection = document.getElementById('resultSection');
        const batchSection = document.getElementById('batchSection');
        const batchList = document.getElementById('batchList');
        const batchDownloadAllBtn = document.getElementById('batchDownloadAllBtn');
        const statusMessage = document.getElementById('statusMessage');
        const historySection = document.getElementById('historySection');
        const historyList = document.getElementById('historyList');
        
        // Mode toggle
        document.getElementById('modeSingle').addEventListener('click', () => switchMode('single'));
        document.getElementById('modeBatch').addEventListener('click', () => switchMode('batch'));
        
        function switchMode(mode) {
            currentMode = mode;
            document.getElementById('modeSingle').classList.toggle('active', mode === 'single');
            document.getElementById('modeBatch').classList.toggle('active', mode === 'batch');
            
            if (mode === 'batch') {
                urlInput.placeholder = '粘贴多个视频链接，每行一个...\n例如：\nhttps://v.douyin.com/xxx1\nhttps://v.douyin.com/xxx2';
                urlInput.rows = 4;
            } else {
                urlInput.placeholder = '粘贴视频分享链接...';
                urlInput.rows = 2;
            }
            
            resultSection.classList.remove('show');
            batchSection.classList.remove('show');
            hideStatus();
        }
        
        // Platform tabs
        document.querySelectorAll('.platform-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.platform-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentPlatform = tab.dataset.platform;
            });
        });
        
        // Paste button
        document.getElementById('pasteBtn').addEventListener('click', async () => {
            try {
                const text = await navigator.clipboard.readText();
                urlInput.value = text;
                if (currentMode === 'single') handleParse();
            } catch (err) {
                showStatus('无法读取剪贴板', 'error');
            }
        });
        
        // Parse events
        parseBtn.addEventListener('click', handleParse);
        urlInput.addEventListener('paste', () => {
            setTimeout(() => {
                if (currentMode === 'single') handleParse();
            }, 100);
        });
        
        // Main parse function
        async function handleParse() {
            if (currentMode === 'batch') return handleBatchParse();
            
            let url = extractUrl(urlInput.value.trim());
            if (!url) {
                showStatus('请输入视频链接', 'error');
                return;
            }
            
            setLoading(true);
            hideStatus();
            resultSection.classList.remove('show');
            batchSection.classList.remove('show');
            
            try {
                const resp = await fetch(`${API_BASE}/api/parse`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url, platform: currentPlatform })
                });
                
                const data = await resp.json();
                
                if (data.code === 0 && data.data) {
                    showSingleResult(data.data);
                    addToHistory(data.data);
                    showStatus('解析成功', 'success');
                } else {
                    showStatus(data.msg || '解析失败', 'error');
                }
            } catch (err) {
                showStatus('无法连接到服务器', 'error');
            } finally {
                setLoading(false);
            }
        }
        
        // Batch parse
        async function handleBatchParse() {
            const raw = urlInput.value.trim();
            if (!raw) {
                showStatus('请输入视频链接', 'error');
                return;
            }
            
            const lines = raw.split('\n').map(l => extractUrl(l.trim())).filter(Boolean);
            if (lines.length === 0) {
                showStatus('未能提取到有效链接', 'error');
                return;
            }
            if (lines.length > 20) {
                showStatus('最多支持 20 个链接', 'error');
                return;
            }
            
            setLoading(true);
            resultSection.classList.remove('show');
            batchSection.classList.add('show');
            
            let batchResults = lines.map((url, i) => ({
                url,
                platform: detectPlatformFromUrl(url),
                index: i,
                status: 'pending',
                data: null
            }));
            
            renderBatchList(batchResults);
            let successCount = 0;
            
            for (let i = 0; i < batchResults.length; i++) {
                batchResults[i].status = 'parsing';
                renderBatchList(batchResults);
                
                try {
                    const resp = await fetch(`${API_BASE}/api/parse`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ url: batchResults[i].url, platform: batchResults[i].platform })
                    });
                    const data = await resp.json();
                    
                    if (data.code === 0 && data.data) {
                        batchResults[i].status = 'success';
                        batchResults[i].data = data.data;
                        successCount++;
                    } else {
                        batchResults[i].status = 'error';
                    }
                } catch (err) {
                    batchResults[i].status = 'error';
                }
                
                renderBatchList(batchResults);
            }
            
            setLoading(false);
            batchDownloadAllBtn.disabled = successCount === 0;
            showStatus(`批量解析完成：${successCount}/${batchResults.length} 个成功`, successCount === batchResults.length ? 'success' : 'error');
        }
        
        function detectPlatformFromUrl(url) {
            if (/douyin|iesdouyin|v\.douyin/i.test(url)) return 'douyin';
            if (/kuaishou|v\.kuaishou/i.test(url)) return 'kuaishou';
            if (/xiaohongshu|xhslink/i.test(url)) return 'xiaohongshu';
            if (/bilibili|b23\.tv/i.test(url)) return 'bilibili';
            return currentPlatform;
        }
        
        // Download function
        window.downloadFile = async function(videoUrl, filename, type) {
            if (isMobile()) {
                showMobileDownloadModal(videoUrl, filename, type);
                return;
            }
            
            showStatus('正在下载...', 'info');
            try {
                const resp = await fetch(videoUrl, { method: 'GET', mode: 'cors' });
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                
                const blob = await resp.blob();
                const blobUrl = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = blobUrl;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(blobUrl);
                showStatus('下载完成', 'success');
            } catch (err) {
                showStatus('已打开视频，请手动保存', 'success');
                window.open(videoUrl, '_blank');
            }
        };
        
        function isMobile() {
            return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        }
        
        function showMobileDownloadModal(videoUrl, filename, type) {
            const isAudio = type === 'audio';
            const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
            const hintText = isIOS ? '长按视频 → 存储视频' : '长按视频 → 保存视频';
            
            const modal = document.createElement('div');
            modal.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.9);display:flex;align-items:center;justify-content:center;z-index:10000;padding:16px;';
            
            modal.innerHTML = `
                <div style="background:#12121a;border:2px solid #00f5ff;padding:16px;max-width:400px;width:100%;text-align:center;">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
                        <h3 style="font-size:14px;">${isAudio ? '🎵 下载音频' : '📹 下载视频'}</h3>
                        <button onclick="this.closest('.mobile-modal').remove()" style="background:transparent;border:none;color:#8888aa;font-size:24px;cursor:pointer;">×</button>
                    </div>
                    <p style="color:#00f5ff;font-size:12px;margin-bottom:12px;">📱 ${hintText}</p>
                    ${isAudio ? `<audio controls src="${videoUrl}" style="width:100%;margin-bottom:12px;"></audio>` : `<video controls playsinline src="${videoUrl}" style="width:100%;max-height:50vh;margin-bottom:12px;"></video>`}
                    <a href="${videoUrl}" download="${filename}" style="display:block;background:linear-gradient(90deg,#ff2d95,#bf00ff);color:white;padding:12px 20px;text-decoration:none;font-weight:600;font-size:14px;">点击下载</a>
                </div>
            `;
            modal.className = 'mobile-modal';
            document.body.appendChild(modal);
            modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });
        }
        
        // Show single result
        function showSingleResult(info) {
            const platformNames = { douyin: '抖音', kuaishou: '快手', xiaohongshu: '小红书', bilibili: 'B站' };
            const safeName = (info.title || 'video').replace(/[^\w\u4e00-\u9fff\-_. ]/g, '').trim() || 'video';
            
            resultSection.innerHTML = `
                <div class="result-card">
                    <div class="result-video">
                        ${info.video_url ? `<video controls preload="metadata" poster="${info.cover || ''}" playsinline><source src="${info.video_url}" type="video/mp4"></video>` : `<div class="no-video"><svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1"><polygon points="5 3 19 12 5 21 5 3"/></svg>暂无视频</div>`}
                    </div>
                    <div class="result-info">
                        <div class="result-title">${escapeHtml(info.title || '未知标题')}</div>
                        <div class="result-meta">
                            ${info.author ? `<span class="result-meta-item"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>${escapeHtml(info.author)}</span>` : ''}
                            <span class="result-meta-item"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>${platformNames[info.platform] || '未知'}</span>
                        </div>
                        <div class="result-actions">
                            ${info.video_url ? `
                                <button class="download-btn download-btn-video" onclick="downloadFile('${info.video_url}','${safeName}.mp4')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>下载视频</button>
                                ${info.music_url ? `<button class="download-btn download-btn-audio" onclick="downloadFile('${info.music_url}','${(info.music_title || safeName).replace(/[^\w\u4e00-\u9fff\-_. ]/g,"")}.mp3','audio')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>下载音频</button>` : ''}
                                <button class="download-btn download-btn-copy" onclick="navigator.clipboard.writeText('${info.video_url}').then(()=>{this.textContent='已复制';setTimeout(()=>this.innerHTML='<svg viewBox=\'0 0 24 24\' width=\'16\' height=\'16\' fill=\'none\' stroke=\'currentColor\' stroke-width=\'2\'><rect x=\'9\' y=\'9\' width=\'13\' height=\'13\' rx=\'2\'/><path d=\'M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1\'/></svg>复制链接',1500)})"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>复制链接</button>
                            ` : ''}
                        </div>
                    </div>
                </div>
            `;
            resultSection.classList.add('show');
            resultSection.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
        
        // Render batch list
        function renderBatchList(items) {
            const statusLabels = { pending: '等待中', parsing: '解析中', success: '成功', error: '失败' };
            
            batchList.innerHTML = items.map((item, i) => {
                const title = item.data?.title || item.url || `视频 ${i + 1}`;
                const cover = item.data?.cover || '';
                const safeName = title.replace(/[^\w\u4e00-\u9fff\-_. ]/g, '').trim() || `video_${i+1}`;
                
                return `
                    <div class="batch-item">
                        <img class="batch-item-thumb" src="${cover}" alt="" onerror="this.style.display='none'">
                        <div class="batch-item-info">
                            <div class="batch-item-title">${escapeHtml(title)}</div>
                            <div class="batch-item-meta">${item.data?.author || ''}</div>
                        </div>
                        <span class="batch-item-status ${item.status === 'parsing' ? 'pending' : item.status}">${statusLabels[item.status] || item.status}</span>
                        <div style="display:flex;gap:6px;">
                            ${item.status === 'success' && item.data?.video_url ? `
                                <button class="batch-item-btn" onclick="downloadFile('${item.data.video_url}','${safeName}.mp4')" title="下载"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></button>
                            ` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // Batch download all
        batchDownloadAllBtn.addEventListener('click', () => {
            const buttons = batchList.querySelectorAll('.batch-item-btn[title="下载"]');
            buttons.forEach((btn, i) => setTimeout(() => btn.click(), i * 500));
        });
        
        // History
        function addToHistory(info) {
            const item = {
                title: info.title,
                platform: info.platform,
                cover: info.cover,
                url: info.video_url,
                time: new Date().toLocaleString('zh-CN')
            };
            history.unshift(item);
            if (history.length > 10) history.pop();
            localStorage.setItem('qingqingjiexi_history', JSON.stringify(history));
            renderHistory();
        }
        
        function renderHistory() {
            if (history.length === 0) {
                historySection.style.display = 'none';
                return;
            }
            historySection.style.display = 'block';
            
            const platformIcons = { douyin: '🎵', kuaishou: '📱', xiaohongshu: '📕', bilibili: '📺' };
            
            historyList.innerHTML = history.map(item => `
                <div class="history-item" onclick="window.open('${item.url}', '_blank')">
                    <div class="history-item-icon">${platformIcons[item.platform] || '📹'}</div>
                    <div class="history-item-info">
                        <div class="history-item-title">${escapeHtml(item.title)}</div>
                        <div class="history-item-time">${item.time}</div>
                    </div>
                </div>
            `).join('');
        }
        
        document.getElementById('clearHistory').addEventListener('click', () => {
            history = [];
            localStorage.removeItem('qingqingjiexi_history');
            renderHistory();
        });
        
        // Utilities
        function extractUrl(text) {
            const match = text.match(/https?:\/\/[^\s\u4e00-\u9fff]+/);
            return match ? match[0].replace(/[，。！？、；：""''）】》]+$/, '') : text.trim();
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function setLoading(loading) {
            parseBtn.disabled = loading;
            parseBtn.querySelector('span').textContent = loading ? '解析中...' : '开始解析';
        }
        
        function showStatus(msg, type) {
            statusMessage.textContent = msg;
            statusMessage.className = 'status-message show ' + type;
            if (type === 'success') setTimeout(hideStatus, 3000);
        }
        
        function hideStatus() {
            statusMessage.classList.remove('show');
        }
        
        // Init
        renderHistory();
    })();
    </script>
</body>
</html>
