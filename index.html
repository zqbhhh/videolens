        <div class="batch-header">
            <span class="batch-label">解析结果</span>
            <button class="batch-download-all" id="batchDownloadAllBtn" disabled>下载全部</button>
        </div>
        <div class="batch-list" id="batchList"></div>
    </section>

    <section class="history-section" id="historySection" style="display:none">
        <div class="history-header">
            <span class="history-label">历史记录</span>
            <button class="history-clear" id="clearHistory">清空</button>
        </div>
        <div class="history-list" id="historyList"></div>
    </section>

    <footer>
        <div class="footer-brand">清清解析</div>
        <div class="footer-copy">完全免费，请合法使用<br>支持抖音、快手、小红书、B站</div>
        <div class="footer-links">
            <a href="#">使用条款</a>
            <a href="#">隐私政策</a>
            <a href="#">联系我们</a>
        </div>
    </footer>

    <script>
    (function() {
        'use strict';

        const API_BASE = '';
        let currentPlatform = 'douyin';
        let currentMode = 'batch';
        let history = JSON.parse(localStorage.getItem('qingqingjiexi_history') || '[]');

        const $ = id => document.getElementById(id);
        const urlInput = $('urlInput');
        const parseBtn = $('parseBtn');
        const resultSection = $('resultSection');
        const batchSection = $('batchSection');
        const batchList = $('batchList');
        const batchDownloadAllBtn = $('batchDownloadAllBtn');
        const statusMessage = $('statusMessage');
        const historySection = $('historySection');
        const historyList = $('historyList');

        // Mode
        $('modeSingle').addEventListener('click', () => switchMode('single'));
        $('modeBatch').addEventListener('click', () => switchMode('batch'));

        function switchMode(mode) {
            currentMode = mode;
            $('modeSingle').classList.toggle('active', mode === 'single');
            $('modeBatch').classList.toggle('active', mode === 'batch');
            urlInput.placeholder = mode === 'batch'
                ? '粘贴视频链接，每行一个...'
                : '粘贴视频分享链接...';
            urlInput.rows = mode === 'batch' ? 4 : 2;
            resultSection.classList.remove('show');
            batchSection.classList.remove('show');
            hideStatus();
        }

        // Platform
        document.querySelectorAll('.platform-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.platform-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentPlatform = tab.dataset.platform;
            });
        });

        // Paste
        $('pasteBtn').addEventListener('click', async () => {
            try {
                urlInput.value = await navigator.clipboard.readText();
                if (currentMode === 'single') handleParse();
            } catch { showStatus('无法读取剪贴板', 'error'); }
        });

        parseBtn.addEventListener('click', handleParse);
        urlInput.addEventListener('paste', () => setTimeout(() => { if (currentMode === 'single') handleParse(); }, 100));

        // Parse
        async function handleParse() {
            if (currentMode === 'batch') return handleBatchParse();
            const url = extractUrl(urlInput.value.trim());
            if (!url) return showStatus('请输入视频链接', 'error');

            setLoading(true);
            hideStatus();
            resultSection.classList.remove('show');
            batchSection.classList.remove('show');

            try {
                const resp = await fetch(`${API_BASE}/api/parse`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url, platform: currentPlatform })
                });
                const data = await resp.json();
                if (data.code === 0 && data.data) {
                    showSingleResult(data.data);
                    addToHistory(data.data);
                    showStatus('解析成功', 'success');
                } else {
                    showStatus(data.msg || '解析失败', 'error');
                }
            } catch { showStatus('无法连接服务器', 'error'); }
            finally { setLoading(false); }
        }

        // Batch
        async function handleBatchParse() {
            const raw = urlInput.value.trim();
            if (!raw) return showStatus('请输入视频链接', 'error');
            const lines = raw.split('\n').map(l => extractUrl(l.trim())).filter(Boolean);
            if (!lines.length) return showStatus('未提取到有效链接', 'error');
            if (lines.length > 20) return showStatus('最多支持 20 个', 'error');

            setLoading(true);
            resultSection.classList.remove('show');
            batchSection.classList.add('show');

            let results = lines.map((url, i) => ({ url, platform: detectPlatform(url), status: 'pending', data: null }));
            renderBatch(results);
            let ok = 0;

            for (let i = 0; i < results.length; i++) {
                results[i].status = 'parsing';
                renderBatch(results);
                try {
                    const resp = await fetch(`${API_BASE}/api/parse`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ url: results[i].url, platform: results[i].platform })
                    });
                    const data = await resp.json();
                    if (data.code === 0 && data.data) { results[i].status = 'success'; results[i].data = data.data; ok++; }
                    else results[i].status = 'error';
                } catch { results[i].status = 'error'; }
                renderBatch(results);
            }

            setLoading(false);
            batchDownloadAllBtn.disabled = !ok;
            showStatus(`完成：${ok}/${results.length} 成功`, ok === results.length ? 'success' : 'error');
        }

        function detectPlatform(url) {
            if (/douyin|iesdouyin/i.test(url)) return 'douyin';
            if (/kuaishou|kwai/i.test(url)) return 'kuaishou';
            if (/xiaohongshu|xhslink/i.test(url)) return 'xiaohongshu';
            if (/bilibili|b23/i.test(url)) return 'bilibili';
            return currentPlatform;
        }

        // Download
        window.downloadFile = async function(url, filename, type) {
            if (isMobile()) return showMobileModal(url, filename, type);
            showStatus('正在下载...', 'info');
            try {
                const resp = await fetch(url, { mode: 'cors' });
                if (!resp.ok) throw new Error();
                const blob = await resp.blob();
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                a.remove();
                showStatus('下载完成', 'success');
            } catch {
                showStatus('已打开视频，请手动保存', 'success');
                window.open(url, '_blank');
            }
        };

        function isMobile() { return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent); }

        function showMobileModal(url, filename, type) {
            const ios = /iPhone|iPad|iPod/i.test(navigator.userAgent);
            const m = document.createElement('div');
            m.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;z-index:10000;padding:20px;';
            m.innerHTML = `<div style="background:#fff;border-radius:20px;padding:24px;max-width:360px;width:100%;text-align:center;">
                <h3 style="font-size:16px;margin-bottom:8px;">${type==='audio'?'🎵 下载音频':'📹 下载视频'}</h3>
                <p style="color:#6e6e73;font-size:13px;margin-bottom:16px;">${ios?'长按视频 → 存储视频':'长按视频 → 保存视频'}</p>
                ${type==='audio'?`<audio controls src="${url}" style="width:100%;margin-bottom:16px;"></audio>`:`<video controls playsinline src="${url}" style="width:100%;max-height:50vh;border-radius:12px;margin-bottom:16px;"></video>`}
                <a href="${url}" download="${filename}" style="display:block;background:#0071e3;color:#fff;padding:14px;border-radius:980px;text-decoration:none;font-weight:500;font-size:15px;">下载</a>
            </div>`;
            m.className = 'mobile-modal';
            document.body.appendChild(m);
            m.addEventListener('click', e => { if (e.target === m) m.remove(); });
        }

        // Single result
        function showSingleResult(info) {
            const names = { douyin:'抖音', kuaishou:'快手', xiaohongshu:'小红书', bilibili:'B站' };
            const safe = (info.title||'video').replace(/[^\w\u4e00-\u9fff\-_. ]/g,'').trim()||'video';

            resultSection.innerHTML = `<div class="result-card">
                <div class="result-video">
                    ${info.video_url ? `<video controls preload="metadata" poster="${info.cover||''}" playsinline><source src="${info.video_url}" type="video/mp4"></video>` : ''}
                </div>
                <div class="result-info">
                    <div class="result-title">${esc(info.title||'未知标题')}</div>
                    <div class="result-meta">
                        ${info.author?`<span>${esc(info.author)}</span>`:''}
                        <span>${names[info.platform]||''}</span>
                    </div>
                    <div class="result-actions">
                        ${info.video_url?`
                            <button class="dl-btn dl-btn-primary" onclick="downloadFile('${info.video_url}','${safe}.mp4')">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                                下载视频
                            </button>
                            ${info.music_url?`<button class="dl-btn dl-btn-secondary" onclick="downloadFile('${info.music_url}','${(info.music_title||safe).replace(/[^\w\u4e00-\u9fff\-_. ]/g,"")}.mp3','audio')">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
                                下载音频
                            </button>`:''}
                            <button class="dl-btn dl-btn-ghost" onclick="navigator.clipboard.writeText('${info.video_url}').then(()=>{this.textContent='已复制';setTimeout(()=>this.textContent='复制链接',1500)})">复制链接</button>
                        `:''}
                    </div>
                </div>
            </div>`;
            resultSection.classList.add('show');
            resultSection.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        // Batch render
        function renderBatch(items) {
            const labels = { pending:'等待', parsing:'解析中', success:'成功', error:'失败' };
            batchList.innerHTML = items.map((item, i) => {
                const title = item.data?.title || item.url || `视频 ${i+1}`;
                const safe = title.replace(/[^\w\u4e00-\u9fff\-_. ]/g,'').trim()||`video_${i+1}`;
                return `<div class="batch-item">
                    <img class="batch-item-thumb" src="${item.data?.cover||''}" alt="" onerror="this.style.display='none'">
                    <div class="batch-item-info">
                        <div class="batch-item-title">${esc(title)}</div>
                        <div class="batch-item-meta">${item.data?.author||''}</div>
                    </div>
                    <span class="batch-item-badge ${item.status==='parsing'?'pending':item.status}">${labels[item.status]}</span>
                    ${item.status==='success'&&item.data?.video_url?`<button class="batch-item-dl" onclick="downloadFile('${item.data.video_url}','${safe}.mp4')">⬇</button>`:''}
                </div>`;
            }).join('');
        }

        batchDownloadAllBtn.addEventListener('click', () => {
            batchList.querySelectorAll('.batch-item-dl').forEach((b, i) => setTimeout(() => b.click(), i * 500));
        });

        // History
        function addToHistory(info) {
            history.unshift({ title: info.title, platform: info.platform, cover: info.cover, url: info.video_url, time: new Date().toLocaleString('zh-CN') });
            if (history.length > 10) history.pop();
            localStorage.setItem('qingqingjiexi_history', JSON.stringify(history));
            renderHistory();
        }

        function renderHistory() {
            if (!history.length) { historySection.style.display = 'none'; return; }
            historySection.style.display = 'block';
            const icons = { douyin:'🎵', kuaishou:'📱', xiaohongshu:'📕', bilibili:'📺' };
            historyList.innerHTML = history.map(h => `<div class="history-item" onclick="window.open('${h.url}','_blank')">
                <div class="history-item-icon">${icons[h.platform]||'📹'}</div>
                <div class="history-item-info"><div class="history-item-title">${esc(h.title)}</div><div class="history-item-time">${h.time}</div></div>
            </div>`).join('');
        }

        $('clearHistory').addEventListener('click', () => { history = []; localStorage.removeItem('qingqingjiexi_history'); renderHistory(); });

        // Utils
        function extractUrl(t) { const m = t.match(/https?:\/\/[^\s\u4e00-\u9fff]+/); return m ? m[0].replace(/[，。！？、；：""''）】》]+$/,'') : t.trim(); }
        function esc(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
        function setLoading(v) { parseBtn.disabled = v; parseBtn.classList.toggle('loading', v); parseBtn.querySelector('.parse-icon').style.display = v?'none':''; parseBtn.querySelector('.parse-loading').style.display = v?'':'none'; parseBtn.querySelector('span').textContent = v?'解析中...':'开始解析'; }
        function showStatus(msg, type) { statusMessage.textContent = msg; statusMessage.className = 'status-message show ' + type; if (type==='success') setTimeout(hideStatus, 3000); }
        function hideStatus() { statusMessage.classList.remove('show'); }

        renderHistory();
    })();
    </script>
</body>
</html>
